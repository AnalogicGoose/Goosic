<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/goosic-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goosic</title>
    <script>
      // The app is dark-only (light mode is deprecated — see the
      // `forcedTheme="dark"` ThemeProvider in src/App.tsx). Assert the dark
      // class before first paint so there's never a light flash while
      // next-themes hydrates.
      document.documentElement.classList.add("dark");
      document.documentElement.style.colorScheme = "dark";
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
